# Application Configuration
app:
  name: "Cuihua Quant System"
  version: "0.1.0"
  debug: false

# Data Storage
database:
  # SQLite is used by default for standalone capability.
  # Can be upgraded to PostgreSQL/MySQL by changing the URL.
  url: "sqlite:///data/cuihua_quant.db"
  echo_sql: false # Set true for debugging DB queries

# Logging
logging:
  level: "INFO"
  format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
  file: "data/logs/quant.log"

# Integrations (Reusing existing skills/tools)
integrations:
  # Path to the existing OpenClaw scripts to reuse them
  existing_scripts_path: "/home/admin/openclaw/workspace/skills/news-daily/scripts"
  
  # Notification hooks
  wecom:
    enabled: true
    # Will be read from .env, but placeholder here
    webhook_url_env: "WECOM_WEBHOOK"

  # External News API (Optional)
  news_api:
    enabled: false
    # e.g., Tushare, JQData, or custom RSS
    url: ""
    key_env: "NEWS_API_KEY"
